<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <main id="login-content">
        <section class="login">
            <div class="login-head">
                <p class="uni-tag">MACQUARIE UNIVERSITY</p>
                <h1>Campus Marketplace <i class="fa-solid fa-shop"></i></h1>
            </div>
            <div class="form">
                <div class="form-group ">
                    <label for="email"><i class="fa-solid fa-envelope"></i> Email: </label>
                    <input type="email" id="email" name="email" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fa-solid fa-key"></i> Password: </label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" autocomplete="current-password" required>
                        <button type="button" id="toggle-password">
                            <i class="fa-regular fa-eye eye-show"></i>
                            <i class="fa-regular fa-eye-slash eye-hide d-none"></i>
                        </button>
                    </div>
                </div>
                <div id="error-message" class="error-box d-none" role="alert"></div>
                <button type="submit" id="submit-form" class="submit-btn">Sign In</button>
            </div>
        </section>
    </main>
    <script type="module" src="./js/login.js"></script>
</body>
</html>
